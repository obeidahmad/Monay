name: ci

# The HARD merge gate: lint + format + type check + tests must pass on every PR
# and on every push to main. build.yml stays separate — it only runs on version
# tags to cut binary releases.
on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-progress run when new commits are pushed to the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + format + type check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dev environment
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy

      - name: Tests
        run: uv run pytest
