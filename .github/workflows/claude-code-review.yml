name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # PINNED to the last known-good release (bundles Claude Code 2.1.202):
        # CLI 2.1.205 broke plugin slash commands in print mode — the agent dies
        # on turn 1 (is_error, 1 turn, $0) while the job still shows green (PRs
        # #53/#54). The floating @v1 tag ships whatever CLI is current, so it
        # reintroduces the break. Unpin (back to @v1) once
        # anthropics/claude-code#76066 is fixed in the shipped CLI.
        uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The bundled /code-review skill does not exist in 2.1.202, so the
          # review must stay on the marketplace plugin while the pin holds.
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --append-system-prompt removes the model's run-to-run discretion:
          # without it the review sometimes consolidates everything into the
          # summary comment and never calls create_inline_comment (e.g. #39 got
          # 0 inline comments while #37 got 5, on identical config). The mandate
          # below forces a per-finding inline comment every time.
          claude_args: >-
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Read,Glob,Grep"
            --append-system-prompt "When reviewing a pull request, post EVERY finding as an inline review comment using the create_inline_comment tool, anchored to the specific file and line. The summary/tracking comment is for the overall verdict and high-level notes only — it must never be used as a substitute for per-finding inline comments."
          # The --comment flag is what makes /code-review actually POST its
          # findings as inline PR comments (see anthropics/claude-code#26227).
          track_progress: true
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

