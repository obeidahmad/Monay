name: build

# Build standalone binaries for Linux + Windows (x86_64 and arm64).
#
#   * a version tag (v*) on a commit that is part of main's history
#     -> build + publish a stable, versioned GitHub Release
#
# A git tag is its own ref, not "on" a branch, so a tag that points at a commit
# which is not on main is ignored (the build is skipped). Running it manually
# from the Actions tab just builds the binaries (no release).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # create releases and upload assets

jobs:
  # A git tag is its own ref, not "on" a branch. This gate enforces that the
  # tagged commit is part of main's history before anything builds or releases,
  # so a tag pushed on a stray feature branch can't cut a release.
  guard:
    name: tag must be on main
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + origin/main to test ancestry
      - id: check
        run: |
          # Manual runs always build; tag pushes must point at a commit on main.
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF_NAME is on main — building."
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Tag $GITHUB_REF_NAME is not on main; skipping build + release."
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.target }}
    needs: guard
    if: needs.guard.outputs.build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            artifact: monay-linux-x86_64
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            artifact: monay-linux-aarch64
          - target: windows-x86_64
            runner: windows-latest
            artifact: monay-windows-x86_64.exe
          - target: windows-arm64
            runner: windows-11-arm
            artifact: monay-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs derives the version from the tag/history

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync runtime + build dependencies
        run: uv sync --no-dev --group build

      - name: Build the binary
        run: uv run --no-dev --group build pyinstaller monay.spec

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/monay.exe "out/${{ matrix.artifact }}"
          else
            mv dist/monay "out/${{ matrix.artifact }}"
            chmod +x "out/${{ matrix.artifact }}"
          fi

      - name: Smoke-test the binary
        shell: bash
        env:
          MONAY_SELFCHECK: "1"
        run: |
          workdir="$(mktemp -d)"
          ( cd "$workdir" && "$GITHUB_WORKSPACE/out/${{ matrix.artifact }}" )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # version tags only, not main pushes or manual runs
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Gather binaries
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;

      - name: Publish stable release (version tag)
        # --generate-notes auto-builds a "What's Changed" list from every PR
        # merged since the previous tag; --notes prepends the one-line asset
        # description above it. PR titles become the changelog entries.
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Monay $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Standalone binaries for Linux and Windows (x86_64 + arm64)."